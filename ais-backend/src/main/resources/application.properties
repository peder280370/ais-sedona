ais.data.dir=/data
spark.connect.url=sc://localhost:15002
quarkus.http.port=8080
quarkus.http.limits.max-body-size=2G
quarkus.vertx.worker-pool-size=4

%test.ais.data.dir=target/test-ais-data
%test.spark.connect.url=sc://localhost:19999

# OpenAPI / Swagger UI
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=AIS Backend API
quarkus.smallrye-openapi.info-version=1.0
quarkus.smallrye-openapi.info-description=Maritime AIS data pipeline — query positions, vessels, and voyage tracks
